name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Lint
        run: python -m flake8 src/ tests/
      - name: Type check
        run: python -m mypy src/
      - name: Run tests
        run: python -m pytest tests/ -v

  # The exe is built and uploaded locally via `gh release create`.
  # CI only validates that tests, lint, and typecheck pass.
  # Building on GitHub Actions produces a different-sized exe with
  # different bundled DLLs that may not work on the target machine.
